version: '3.8'

services:
  system-monitor:
    image: spring-system-monitor:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    container_name: springboot-system-monitor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# To build and run:
# docker-compose build
# docker-compose up -d
#
# To see logs:
# docker-compose logs -f
#
# To stop:
# docker-compose down
